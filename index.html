<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบแจ้งการทำธุรกรรม สหกรณ์ออมทรัพย์กรมวิชาการเกษตร จำกัด</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ป้องกันปัญหาหน้าเว็บถูกฝังใน iframe ซ้อนกัน -->
    <base target="_top">
    <style>
        /* ลบ margin/padding พื้นฐานของเบราว์เซอร์ เพื่อให้ iframe เต็มจอ 100% */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ป้องกันการมีแถบเลื่อนซ้อนกัน */
            background-color: #f3f4f6; /* สีพื้นหลังระหว่างรอโหลด */
        }
    </style>
</head>
<body>
    <script>
        // อ่านค่าเลขสมาชิกที่ส่งมาจาก LINE Bot
        const urlParams = new URLSearchParams(window.location.search);
        const memberNo = urlParams.get('member_no');
        
        // Base URL ของ Google Apps Script ของคุณ
        let gasUrl = "https://script.google.com/macros/s/AKfycbzYm1dytsZ00887S6smqjbIOucvOcZa-KqLvDfxrFzniALTog3Q581Lb7mSnoJSlVmk/exec";
        
        // ถ้ามีเลขสมาชิก ให้แนบต่อท้าย URL เพื่อให้ GAS ดึงไปกรอกอัตโนมัติ
        if (memberNo) {
            gasUrl += "?member_no=" + encodeURIComponent(memberNo);
        }
        
        // สร้าง Iframe เพื่อโหลดหน้าเว็บ
        document.write('<iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" src="' + gasUrl + '" allowfullscreen="true"></iframe>');
    </script>
</body>
</html>
