<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>แจ้งการทำธุรกรรม สอ.กวก.</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      font-family: "Sarabun", sans-serif;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0F5D73;
    }
    .loading-box {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #0F5D73, #1A7A96);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; z-index: 10;
    }
    .spinner {
      width: 50px; height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 16px; opacity: 0.9; margin-bottom: 30px; }
    .status { font-size: 14px; opacity: 0.8; }
    #gas-frame {
      width: 100%; height: 100vh;
      border: none; display: none;
    }
  </style>
</head>
<body>
  <div class="loading-box" id="loading-box">
    <div class="logo">สอ.กวก.</div>
    <div class="subtitle">แจ้งการทำธุรกรรมออนไลน์</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">กำลังเชื่อมต่อ LINE...</div>
  </div>

  <!-- แสดง GAS ในกรอบ iframe เพื่อให้อยู่ที่โดเมน doacoop-it.github.io -->
  <iframe id="gas-frame" allow="geolocation; microphone; camera"></iframe>

  <script>
    var LIFF_ID = "2010640180-9mfVqp1M";
    var GAS_URL = "https://script.google.com/macros/s/AKfycbzYm1dytsZ00887S6smqjbIOucvOcZa-KqLvDfxrFzniALTog3Q581Lb7mSnoJSlVmk/exec";

    async function initLiff() {
      try {
        document.getElementById("status").textContent = "กำลังเชื่อมต่อ LINE...";
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        var profile = await liff.getProfile();
        var lineId = profile.userId;

        // รับค่า member_no จาก URL ที่ E-Services ส่งมา
        var urlParams = new URLSearchParams(window.location.search);
        var memberNo = urlParams.get("member_no") || urlParams.get("memberNo") || "";

        document.getElementById("status").textContent = "กำลังเปิดระบบทำธุรกรรม...";
        var targetUrl = GAS_URL + "?line_id=" + encodeURIComponent(lineId);
        if (memberNo) {
          targetUrl += "&member_no=" + encodeURIComponent(memberNo);
        }

        // ใช้ iframe.src แทน window.location.href
        var frame = document.getElementById("gas-frame");
        frame.onload = function() {
          document.getElementById("loading-box").style.display = "none";
          frame.style.display = "block";
        };
        frame.src = targetUrl;

      } catch (err) {
        console.error("LIFF Error:", err);
      }
    }

    initLiff();
  </script>
</body>
</html>
